---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  interval: 24h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      newt:
        containers:
          app:
            image:
              repository: docker.io/fosrl/newt
              tag: 1.12.5
            env:
              LOG_LEVEL: INFO
              HEALTH_FILE: /tmp/healthy
              PANGOLIN_ENDPOINT:
                valueFrom:
                  secretKeyRef: { name: homelab-newt-site, key: PANGOLIN_ENDPOINT }
              NEWT_ID:
                valueFrom:
                  secretKeyRef: { name: homelab-newt-site, key: NEWT_ID }
              NEWT_SECRET:
                valueFrom:
                  secretKeyRef: { name: homelab-newt-site, key: NEWT_SECRET }
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [test, "-f", /tmp/healthy]
                  initialDelaySeconds: 10
                  periodSeconds: 15
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [test, "-f", /tmp/healthy]
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests: { cpu: 100m, memory: 128Mi }
              limits: { cpu: 200m, memory: 256Mi }
    service:
      app:
        controller: newt
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 192.168.1.23
        ports:
          wg: { port: 51820, protocol: UDP, targetPort: 51820 }
          tester: { port: 51821, protocol: UDP, targetPort: 51821 }
