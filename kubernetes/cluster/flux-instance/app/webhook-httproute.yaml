---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-webhook
  namespace: flux-system
  annotations:
    external-dns.alpha.kubernetes.io/public: "true"
    towonel.io/tunnel: enabled
    towonel.io/tunnel-ref: towonel-system/homelab
spec:
  hostnames:
    - webhook.jetersen.dev
  parentRefs:
    - name: envoy-proxy
      namespace: kube-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /test
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: webhook-test-response
    - matches:
        - path:
            type: PathPrefix
            value: /flux/hook
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /hook
      backendRefs:
        - name: webhook-receiver
          namespace: flux-system
          port: 80
    - matches:
        - path:
            type: Exact
            value: /konflate/hooks
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /hooks
      backendRefs:
        - name: konflate
          namespace: konflate
          port: 8080
