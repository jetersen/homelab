---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  releaseName: victoria-logs-collector
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  values:
    remoteWrite:
      - url: http://victoria-logs-single-server.monitoring.svc.cluster.local:9428
        format: native
        maxDiskUsagePerURL: 2GiB
    msgField:
      - message
      - msg
      - log
      - x-envoy-origin-path
      - :authority
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
