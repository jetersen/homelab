---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: technitium
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      technitium:
        strategy: Recreate
        pod:
          terminationGracePeriodSeconds: 10
        containers:
          app:
            image:
              repository: docker.io/technitium/dns-server
              tag: 15.2.0
            env:
              DNS_SERVER_DOMAIN: dns.technitium.lan.jetersen.dev
              DNS_SERVER_ADMIN_PASSWORD_FILE: /run/secrets/admin/password
              DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
              DNS_SERVER_WEB_SERVICE_HTTPS_PORT: "53443"
              DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "false"
              DNS_SERVER_WEB_SERVICE_HTTP_TO_TLS_REDIRECT: "false"
              DNS_SERVER_RECURSION: AllowOnlyForPrivateNetworks
              DNS_SERVER_FORWARDERS: tls://security.cloudflare-dns.com (1.1.1.2), tls://security.cloudflare-dns.com (1.0.0.2)
              DNS_SERVER_FORWARDER_PROTOCOL: Tls
              DNS_SERVER_ENABLE_BLOCKING: "true"
              DNS_SERVER_LOG_USING_LOCAL_TIME: "true"
              DNS_SERVER_BLOCK_LIST_URLS: >-
                https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt,
                https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt,
                https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling/hosts,
                https://v.firebog.net/hosts/Easylist.txt,
                https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.txt
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 53 }
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: 5380 }
                  initialDelaySeconds: 5
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
                add: [NET_BIND_SERVICE]
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { memory: 512Mi }
    service:
      dns:
        controller: technitium
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 192.168.1.21
        ports:
          dns-tcp: { port: 53, protocol: TCP, targetPort: 53 }
          dns-udp: { port: 53, protocol: UDP, targetPort: 53 }
          https-cluster: { port: 53443, protocol: TCP, targetPort: 53443 }
      app:
        controller: technitium
        ports:
          http: { port: 5380, targetPort: 5380 }
    route:
      app:
        hostnames: [dns.lan.jetersen.dev]
        parentRefs:
          - name: envoy-proxy
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 5380
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: local-path
        advancedMounts:
          technitium:
            app:
              - path: /etc/dns
      admin:
        type: secret
        name: technitium-auth
        advancedMounts:
          technitium:
            app:
              - path: /run/secrets/admin
                readOnly: true
