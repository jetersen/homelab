---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: technitium
  labels:
    app.kubernetes.io/name: technitium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: technitium
  template:
    metadata:
      labels:
        app.kubernetes.io/name: technitium
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      containers:
        - name: technitium
          image: docker.io/technitium/dns-server:14.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
            - { name: dns-udp, containerPort: 53, protocol: UDP }
            - { name: http, containerPort: 5380, protocol: TCP }
          env:
            - { name: DNS_SERVER_DOMAIN, value: dns.lan.jetersen.dev }
            - { name: DNS_SERVER_ADMIN_PASSWORD_FILE, value: /run/secrets/admin/password }
            - { name: DNS_SERVER_WEB_SERVICE_HTTP_PORT, value: "5380" }
            - { name: DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS, value: "false" }
            - { name: DNS_SERVER_WEB_SERVICE_HTTP_TO_TLS_REDIRECT, value: "false" }
            - { name: DNS_SERVER_RECURSION, value: AllowOnlyForPrivateNetworks }
            - { name: DNS_SERVER_FORWARDERS, value: "tls://security.cloudflare-dns.com (1.1.1.2), tls://security.cloudflare-dns.com (1.0.0.2)" }
            - { name: DNS_SERVER_FORWARDER_PROTOCOL, value: Tls }
            - { name: DNS_SERVER_ENABLE_BLOCKING, value: "true" }
            - name: DNS_SERVER_BLOCK_LIST_URLS
              value: >-
                https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt,
                https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt,
                https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling/hosts,
                https://v.firebog.net/hosts/Easylist.txt,
                https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.txt
            - { name: DNS_SERVER_LOG_USING_LOCAL_TIME, value: "true" }
          volumeMounts:
            - { name: config, mountPath: /etc/dns }
            - { name: admin, mountPath: /run/secrets/admin, readOnly: true }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          livenessProbe:
            tcpSocket: { port: 53 }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: 5380 }
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: technitium
        - name: admin
          secret:
            secretName: technitium-auth
