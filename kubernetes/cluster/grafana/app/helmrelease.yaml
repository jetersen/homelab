---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  interval: 24h
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana
  values:
    envFromSecret: grafana-github-oauth
    grafana.ini:
      server:
        root_url: https://grafana.jetersen.dev
      auth:
        disable_login_form: true
        oauth_auto_login: false
      auth.github:
        enabled: true
        allow_sign_up: true
        allow_device_flow: false
        client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
        client_secret: $__env{GF_AUTH_GITHUB_CLIENT_SECRET}
        scopes: user:email,read:org
        auth_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        api_url: https://api.github.com/user
        allowed_organizations: jetersen-cloud
        role_attribute_path: "[login=='jetersen'][0] && 'Admin' || 'Viewer'"
    # Local-path/Talos can reject recursive chown on existing data dirs.
    # Rely on pod fsGroup instead of the chart's init-chown-data container.
    initChownData:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    plugins:
      - victoriametrics-logs-datasource
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            url: http://victoria-metrics-server:8428
            isDefault: true
            access: proxy
          - name: VictoriaLogs
            type: victoriametrics-logs-datasource
            url: http://victoria-logs-single-server:9428
            access: proxy
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        label: grafana_dashboard
        labelValue: "1"
