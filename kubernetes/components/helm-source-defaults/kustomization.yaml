---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: source.toolkit.fluxcd.io
      version: v1
      kind: HelmRepository
    patch: |-
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: not-used
      spec:
        interval: 24h
