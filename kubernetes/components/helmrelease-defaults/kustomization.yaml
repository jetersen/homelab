---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        interval: 24h
        maxHistory: 2
        install:
          crds: CreateReplace
          strategy:
            name: RetryOnFailure
        rollback:
          cleanupOnFail: true
          recreate: true
        upgrade:
          cleanupOnFail: true
          crds: CreateReplace
          strategy:
            name: RemediateOnFailure
          remediation:
            remediateLastFailure: true
            retries: 2
