---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  upgrade:
    force: true
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      hostNetwork: true
    controllers:
      home-assistant:
        strategy: Recreate
        containers:
          app:
            nameOverride: home-assistant
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.4
              pullPolicy: IfNotPresent
            ports:
              - name: http
                containerPort: 8123
                hostPort: 8123
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
                    scheme: HTTP
                  periodSeconds: 20
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
                    scheme: HTTP
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
    service:
      app:
        controller: home-assistant
        ports:
          http:
            port: 8123
            targetPort: 8123
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: local-path
        forceRename: home-assistant-pvc
        retain: true
        advancedMounts:
          home-assistant:
            app:
              - path: /config
