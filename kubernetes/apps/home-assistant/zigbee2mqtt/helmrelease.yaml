---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      zigbee2mqtt:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/koenkk/zigbee2mqtt
              tag: 2.12.0
            env:
              ZIGBEE2MQTT_DATA: /data
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_DISCOVERY_TOPIC: homeassistant
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_STATUS_TOPIC: homeassistant/status
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_LEGACY_ACTION_SENSOR: "false"
              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: mqtt://mosquitto:1883
              ZIGBEE2MQTT_CONFIG_MQTT_CLIENT_ID: zigbee2mqtt
              ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC: zigbee2mqtt
              ZIGBEE2MQTT_CONFIG_MQTT_USER:
                valueFrom:
                  secretKeyRef: { name: zigbee2mqtt, key: mqttUser }
              ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: zigbee2mqtt, key: mqttPassword }
              ZIGBEE2MQTT_CONFIG_PERMIT_JOIN: "true"
              ZIGBEE2MQTT_CONFIG_SERIAL_PORT: tcp://192.168.1.9:6638
              ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE: "115200"
              ZIGBEE2MQTT_CONFIG_SERIAL_RTSCTS: "false"
              ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: zstack
              ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
              ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL: "25"
              ZIGBEE2MQTT_CONFIG_ADVANCED_TRANSMIT_POWER: "20"
              ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY:
                valueFrom:
                  secretKeyRef: { name: zigbee2mqtt, key: zigbeeNetworkKey }
              ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID:
                valueFrom:
                  secretKeyRef: { name: zigbee2mqtt, key: zigbeePanId }
              ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID:
                valueFrom:
                  secretKeyRef: { name: zigbee2mqtt, key: zigbeeExtPanId }
    service:
      app:
        controller: zigbee2mqtt
        ports:
          http: { port: 8080, targetPort: 8080 }
      zigbee:
        controller: zigbee2mqtt
        primary: false
        type: ExternalName
        externalName: 192.168.1.9
        ports:
          tcp: { port: 6638, targetPort: 6638, protocol: TCP }
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: local-path
        advancedMounts:
          zigbee2mqtt:
            app:
              - path: /data
