  dependsOn:
    - name: mosquitto
  interval: 24h
  timeout: 5m
  path: ./kubernetes/apps/home-assistant/zigbee2mqtt
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: false
