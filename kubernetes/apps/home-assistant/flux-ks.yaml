---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  targetNamespace: home-assistant
  commonMetadata:
    labels:
      app.kubernetes.io/name: home-assistant
  dependsOn:
    - name: mosquitto
  interval: 24h
  timeout: 5m
  path: ./kubernetes/apps/home-assistant/home-assistant
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
  namespace: home-assistant
spec:
  targetNamespace: home-assistant
  commonMetadata:
    labels:
      app.kubernetes.io/name: mosquitto
  interval: 24h
  timeout: 5m
  path: ./kubernetes/apps/home-assistant/mosquitto
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
