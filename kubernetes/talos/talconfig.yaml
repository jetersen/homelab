---
clusterName: homelab
# renovate: datasource=github-releases depName=siderolabs/talos
talosVersion: v1.13.5
# renovate: datasource=github-releases depName=kubernetes/kubernetes
kubernetesVersion: v1.36.2
endpoint: https://192.168.1.10:6443
domain: cluster.local
allowSchedulingOnMasters: true
additionalMachineCertSans:
  - 192.168.1.10
  - talos01
  - talos01.lan.jetersen.dev
additionalApiServerCertSans:
  - talos01
  - talos01.lan.jetersen.dev
clusterPodNets:
  - 172.22.0.0/16
clusterSvcNets:
  - 172.23.0.0/16
cniConfig:
  name: none
patches:
  - |-
    machine:
      install:
        wipe: true
      env:
        GRPC_GO_LOG_SEVERITY_LEVEL: error
      kubelet:
        nodeIP:
          validSubnets:
            - 192.168.1.0/24
    cluster:
      proxy:
        disabled: true
nodes:
  - hostname: talos01
    userVolumes:
      - name: local-path-provisioner
        provisioning:
          diskSelector:
            match: disk.transport == "nvme"
          maxSize: 1500GiB
    volumes:
      - name: EPHEMERAL
        provisioning:
          diskSelector:
            match: disk.transport == "nvme"
          maxSize: 100GiB
    ipAddress: 192.168.1.10
    controlPlane: true
    machineSpec:
      mode: metal
      arch: amd64
      useUKI: false
      secureboot: false
    schematic:
      customization:
        extraKernelArgs:
          - -init_on_alloc
          - -init_on_free
          - -selinux
          - apparmor=0
          - init_on_alloc=0
          - init_on_free=0
          - mitigations=off
          - security=none
          - talos.auditd.disabled=1
          - cpufreq.default_governor=powersave
          - talos.dashboard.disabled=1
        systemExtensions:
          officialExtensions:
            - siderolabs/intel-ucode
            - siderolabs/i915
    installDisk: /dev/nvme0n1
    nodeAnnotations:
      installerUrl: '{{ .MachineConfig.MachineInstall.InstallImage }}'
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: enp1s0
        dhcp: true
